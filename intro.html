<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVOlearn</title>
  <style>
    :root {
      --navy: #203140;
      --navy-deep: #1a2935;
      --cyan: #5ad9ff;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      /* persistent navy stage (stays behind both the logo and the video) */
      background:
        radial-gradient(120% 90% at 50% 38%, rgba(90,217,255,.10), rgba(32,49,64,0) 55%),
        radial-gradient(140% 120% at 50% 50%, var(--navy) 0%, var(--navy-deep) 70%, #15212c 100%);
    }

    /* ===================== INTRO STAGE ===================== */
    .intro {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: transparent;
      transition: opacity .9s var(--ease), transform 1.1s var(--ease), filter .9s var(--ease);
      perspective: 1400px;
    }
    .intro.is-leaving {
      opacity: 0;
      transform: scale(1.06);
      filter: blur(6px);
      pointer-events: none;
    }

    /* soft floor reflection / grounding glow */
    .floor-glow {
      position: absolute; left: 50%; top: 62%; transform: translateX(-50%);
      width: min(58vmin, 460px); height: min(20vmin, 150px);
      background: radial-gradient(closest-side, rgba(90,217,255,.16), rgba(90,217,255,0) 75%);
      filter: blur(6px); pointer-events: none;
    }

    /* ===================== 3D LOGO ===================== */
    .logo-stage {
      position: relative;
      transform-style: preserve-3d;
      animation: logo-float 7s ease-in-out infinite;
      will-change: transform;
    }
    .logo {
      display: block;
      width: min(40vmin, 320px); height: auto;
      /* fake extrusion: stacked dark drop-shadows downward build depth/bevel,
         then a soft cast shadow grounds it, and a cyan rim adds the lighting */
      filter:
        drop-shadow(0 1px 0 #1b2a36) drop-shadow(0 2px 0 #19272f)
        drop-shadow(0 3px 0 #16232b) drop-shadow(0 4px 0 #141f27)
        drop-shadow(0 5px 0 #121c23) drop-shadow(0 6px 0 #101920)
        drop-shadow(0 7px 0 #0e161c) drop-shadow(0 8px 1px #0c1318)
        drop-shadow(0 26px 30px rgba(0,0,0,.55))
        drop-shadow(0 0 26px rgba(90,217,255,.28));
      transition: filter .6s var(--ease);
    }
    /* gentle specular sheen sweeping across the mark */
    .logo-stage::after {
      content: "";
      position: absolute; inset: -6%;
      background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.16) 50%, transparent 62%);
      mix-blend-mode: screen;
      transform: translateX(-30%);
      animation: sheen 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes logo-float {
      0%   { transform: translateY(0) rotateX(7deg) rotateY(-7deg); }
      50%  { transform: translateY(-14px) rotateX(-5deg) rotateY(7deg); }
      100% { transform: translateY(0) rotateX(7deg) rotateY(-7deg); }
    }
    @keyframes sheen {
      0%, 18%  { transform: translateX(-130%); opacity: 0; }
      42%      { opacity: .9; }
      66%, 100%{ transform: translateX(130%); opacity: 0; }
    }

    /* intro entrance */
    .logo-stage, .enter { animation-fill-mode: both; }
    .logo-stage { animation: logo-float 7s ease-in-out infinite, rise 1.2s var(--ease); }
    .enter { animation: rise 1.2s var(--ease) .35s both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; }
    }

    /* ===================== ENTER ARROW ===================== */
    .enter {
      position: absolute; left: 50%; bottom: clamp(7%, 12vh, 14%); transform: translateX(-50%);
      display: grid; place-items: center;
      width: 62px; height: 62px; border-radius: 50%;
      cursor: pointer; background: transparent;
      border: 1px solid rgba(90,217,255,.35);
      box-shadow: 0 0 0 0 rgba(90,217,255,.35);
      transition: transform .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease);
    }
    .enter::before {
      content: ""; position: absolute; inset: -10px; border-radius: 50%;
      border: 1px solid rgba(90,217,255,.18);
      animation: pulse-ring 2.6s ease-out infinite;
    }
    .enter svg { width: 24px; height: 24px; stroke: var(--cyan); animation: bob 2.2s ease-in-out infinite; }
    .enter:hover {
      transform: translateX(-50%) translateY(-3px);
      border-color: rgba(90,217,255,.7);
      box-shadow: 0 0 26px rgba(90,217,255,.4);
    }
    .enter:active { transform: translateX(-50%) translateY(-1px) scale(.96); }
    @keyframes bob { 0%,100% { transform: translateY(-2px); } 50% { transform: translateY(3px); } }
    @keyframes pulse-ring {
      0%   { transform: scale(.85); opacity: .8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* ===================== VIDEO (centered screen) ===================== */
    .video-stage {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .8s var(--ease);
    }
    .video-stage.is-active { opacity: 1; pointer-events: auto; }
    .intro-video {
      display: block;
      width: auto; height: auto;
      max-width: min(82vw, 940px);
      max-height: 72vh;
      border-radius: 18px;
      background: #0a1218;
      box-shadow:
        0 40px 110px rgba(0, 0, 0, .6),
        0 0 0 1px rgba(90, 217, 255, .16),
        0 0 46px rgba(90, 217, 255, .12);
      transform: scale(.96);
      transition: transform .8s var(--ease);
    }
    .video-stage.is-active .intro-video { transform: scale(1); }

    /* clear skip control beneath the video screen */
    .skip-video {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 26px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 14.5px; font-weight: 600; letter-spacing: .02em;
      color: #eaf6fb; background: rgba(16, 28, 38, .66);
      border: 1px solid rgba(90, 217, 255, .4);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, .35);
      transition: transform .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease);
    }
    .skip-video:hover {
      transform: translateY(-2px);
      background: rgba(90, 217, 255, .16);
      border-color: rgba(90, 217, 255, .8);
      box-shadow: 0 14px 30px rgba(90, 217, 255, .28);
    }
    .skip-video:active { transform: translateY(0) scale(.98); }
    .skip-video svg { width: 15px; height: 15px; }

    @media (prefers-reduced-motion: reduce) {
      .logo-stage, .logo-stage::after, .enter svg, .enter::before { animation: none !important; }
      .intro, .intro-video { transition: opacity .4s ease; }
    }
  </style>
</head>
<body>
  <!-- Existing EVOlearn intro video, shown as a centered screen on the navy stage -->
  <div class="video-stage" id="video-stage">
    <video class="intro-video" id="intro-video" playsinline preload="auto">
      <source src="EVOLearn.mp4" type="video/mp4" />
    </video>
    <button class="skip-video" id="skip-video" type="button" aria-label="Skip intro video">
      Skip video
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 4l11 8-11 8z" /><path d="M19 5v14" />
      </svg>
    </button>
  </div>

  <!-- Premium entry screen -->
  <main class="intro" id="intro" role="button" tabindex="0" aria-label="Enter EVOlearn">
    <div class="floor-glow" aria-hidden="true"></div>
    <div class="logo-stage">
      <img class="logo" src="assets/logo.svg" alt="EVOlearn" draggable="false" />
    </div>
    <button class="enter" id="enter" type="button" aria-label="Enter">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 9l6 6 6-6" />
      </svg>
    </button>
  </main>

  <script>
    (function () {
      var intro = document.getElementById('intro');
      var enter = document.getElementById('enter');
      var video = document.getElementById('intro-video');
      var videoStage = document.getElementById('video-stage');
      var skipBtn = document.getElementById('skip-video');
      var done = false;

      function goToHome() {
        // Flow: intro → video → login → index. The "entered" flag is set on
        // the login page, so the guard keeps routing here until login finishes.
        if (done) return;
        done = true;
        location.replace('login.html');
      }

      function playIntro() {
        if (intro.classList.contains('is-leaving')) return;
        intro.classList.add('is-leaving');

        // Reveal + play the existing EVOlearn video. The click is a user
        // gesture, so playback with sound is allowed.
        // reveal the centered video screen (with its Skip control)
        videoStage.classList.add('is-active');
        var p = video.play();
        if (p && p.catch) {
          p.catch(function () {
            // Autoplay blocked or no media — go straight through after the fade.
            setTimeout(goToHome, 400);
          });
        }
      }

      // Enter via the arrow, clicking the stage, or keyboard.
      enter.addEventListener('click', function (e) { e.stopPropagation(); playIntro(); });
      intro.addEventListener('click', playIntro);
      intro.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); playIntro(); }
      });

      // When the video finishes (or is skipped / errors), enter the app.
      video.addEventListener('ended', goToHome);
      video.addEventListener('error', function () { setTimeout(goToHome, 300); });
      skipBtn.addEventListener('click', function (e) { e.stopPropagation(); goToHome(); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && video.classList.contains('is-active')) goToHome();
      });
    })();
  </script>
</body>
</html>
