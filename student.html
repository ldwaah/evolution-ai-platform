<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: #07111f;
      background:
        linear-gradient(rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px),
        #ffffff;
      background-size: 42px 42px;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 32px 24px 104px;
    }

    .dashboard {
      width: min(1080px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .panel {
      display: grid;
      min-height: 360px;
      place-items: center;
      margin-top: 28px;
      padding: 24px;
      border: 1px solid rgba(37, 99, 235, 0.16);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 70px rgba(37, 99, 235, 0.1);
    }

    .panel-content {
      width: min(520px, 100%);
    }

    .panel-content.is-wide {
      width: 100%;
    }

    .panel h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .panel p {
      margin: 8px 0 0;
      color: #64748b;
    }

    .tutor-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
      text-align: center;
    }

    .tutor-card {
      display: grid;
      min-height: clamp(164px, 22vw, 230px);
      align-content: center;
      justify-items: center;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(160deg, #2563eb 0%, #1d4ed8 58%, #183a96 100%);
      box-shadow: 0 16px 36px rgba(37, 99, 235, 0.2);
      cursor: pointer;
      text-align: center;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .tutor-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(37, 99, 235, 0.28);
    }

    .tutor-card-header {
      display: grid;
      justify-items: center;
      gap: 9px;
      width: 100%;
    }

    .avatar-wrap {
      position: relative;
      display: inline-grid;
      width: 100%;
      place-items: center;
    }

    .avatar-wrap::after {
      content: attr(data-level);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      z-index: 5;
      padding: 7px 10px;
      border-radius: 8px;
      color: #ffffff;
      background: #07111f;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
      font-size: 0.78rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(4px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      white-space: nowrap;
    }

    .avatar-wrap:hover::after,
    .avatar-wrap:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .tutor-avatar {
      display: grid;
      width: 100%;
      height: clamp(110px, 16vw, 178px);
      flex: 0 0 auto;
      place-items: center;
      overflow: hidden;
      border-radius: 14px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.95);
      font-weight: 900;
    }

    .tutor-avatar.is-image {
      border: 0;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.72);
    }

    .tutor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      transform: none;
    }

    .tutor-avatar svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tutor-card h3 {
      margin: 0;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 900;
    }

    .quiz-action {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    .quiz-action.is-prominent {
      margin-top: 0;
      margin-bottom: 22px;
    }

    .tutor-grid.is-quiz-gated {
      opacity: 0.38;
      pointer-events: none;
      filter: grayscale(0.35);
    }

    .quiz-gate-message {
      margin: 14px 0 0;
      color: #64748b;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: center;
    }

    .tutor-panel-intro {
      margin: 8px 0 0;
      color: #64748b;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }

    .quiz-button {
      display: inline-flex;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border: 0;
      border-radius: 14px;
      color: #ffffff;
      background: #2563eb;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.24);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .quiz-button:hover,
    .quiz-button:focus-visible {
      background: #1d4ed8;
      outline: 4px solid rgba(37, 99, 235, 0.18);
      outline-offset: 3px;
    }

    .lesson-launch {
      display: grid;
      justify-items: center;
      margin-top: 22px;
    }

    .lesson-launch-button {
      display: inline-flex;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      color: #ffffff;
      background: #2563eb;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.24);
      font-weight: 900;
      text-decoration: none;
    }

    .demo-sessions-section {
      margin-top: 28px;
      text-align: left;
    }

    .demo-sessions-heading {
      margin: 0;
      font-size: 1rem;
      text-align: center;
    }

    .demo-sessions-note {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 0.84rem;
      line-height: 1.45;
      text-align: center;
    }

    .demo-sessions-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .demo-session-card {
      display: grid;
      gap: 8px;
      padding: 16px 14px;
      border: 1px solid rgba(37, 99, 235, 0.16);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      text-align: center;
      cursor: default;
      user-select: none;
    }

    .demo-session-number {
      display: inline-flex;
      min-width: 28px;
      min-height: 28px;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border-radius: 999px;
      color: #2563eb;
      background: rgba(37, 99, 235, 0.1);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .demo-session-card strong {
      display: block;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    @media (max-width: 960px) {
      .demo-sessions-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .demo-sessions-grid {
        grid-template-columns: 1fr;
      }
    }

    .bottom-tabs {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 14px 16px;
      background: transparent;
    }

    .tab-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 8px;
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(18px);
    }

    .tab {
      display: inline-flex;
      position: relative;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 0;
      border-radius: 18px;
      color: #64748b;
      background: transparent;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .tab svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      z-index: 5;
      padding: 7px 10px;
      border-radius: 8px;
      color: #ffffff;
      background: #07111f;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
      font-size: 0.78rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(4px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      white-space: nowrap;
    }

    .tab.active,
    .tab:hover,
    .tab:focus-visible {
      color: #2563eb;
      background: rgba(37, 99, 235, 0.08);
      outline: none;
    }

    .tab.active {
      color: #ffffff;
      background: #2563eb;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.24);
    }

    .tab:hover::after,
    .tab:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      main {
        padding: 24px 16px 96px;
      }

      .tab-list {
        gap: 2px;
        padding: 6px;
      }

      .tab {
        min-height: 48px;
        padding: 8px 4px;
        font-size: 0.82rem;
      }

      .tutor-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .tutor-card {
        min-height: 148px;
        padding: 8px;
      }

      .tutor-card-header {
        gap: 8px;
      }

      .tutor-avatar {
        height: 92px;
        border-radius: 12px;
      }

      .tutor-card h3 {
        font-size: 0.92rem;
      }

    }

    @media (min-width: 641px) and (max-width: 920px) {
      .tutor-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .panel-content.is-progress {
      width: 100%;
      text-align: left;
    }

    .progress-intro {
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 28px 12px;
      text-align: center;
    }

    .progress-intro h2 {
      margin: 0;
      font-size: 1.35rem;
    }

    .progress-intro p {
      margin: 0;
      max-width: 420px;
      color: #64748b;
    }

    .demo-progress-button {
      display: inline-flex;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      padding: 14px 28px;
      border: 0;
      border-radius: 14px;
      color: #ffffff;
      background: #2563eb;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.24);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .demo-progress-button:hover,
    .demo-progress-button:focus-visible {
      transform: translateY(-2px);
      background: #1d4ed8;
      box-shadow: 0 20px 44px rgba(37, 99, 235, 0.28);
      outline: 4px solid rgba(37, 99, 235, 0.18);
      outline-offset: 3px;
    }

    .progress-demo {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: rgba(37, 99, 235, 0.12);
      --ink: #07111f;
      --muted: #64748b;
      display: grid;
      gap: 18px;
      color: var(--ink);
      animation: progress-fade-in 0.45s ease;
    }

    @keyframes progress-fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .progress-demo-card {
      padding: 20px;
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.1);
    }

    .progress-hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      align-items: center;
      padding: 24px;
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 22px;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 42%),
        linear-gradient(160deg, rgba(37, 99, 235, 0.06) 0%, rgba(255, 255, 255, 0.96) 100%);
      box-shadow: 0 20px 48px rgba(37, 99, 235, 0.12);
    }

    .progress-ring {
      --size: 96px;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--primary-dark);
      background:
        radial-gradient(circle, #ffffff 58%, transparent 59%),
        conic-gradient(var(--primary) 0 68%, rgba(37, 99, 235, 0.12) 68% 100%);
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.1);
    }

    .progress-ring strong {
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .progress-hero-copy h3 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 1.8rem);
      letter-spacing: -0.03em;
    }

    .progress-hero-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .progress-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .progress-pill {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .progress-pill.is-gold {
      color: #ffffff;
      background: linear-gradient(160deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .progress-span-2 {
      grid-column: 1 / -1;
    }

    .progress-section-title {
      margin: 0 0 14px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .journey-list {
      display: grid;
      gap: 10px;
    }

    .journey-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(37, 99, 235, 0.05);
      border: 1px solid rgba(37, 99, 235, 0.08);
    }

    .journey-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.2);
    }

    .journey-item.is-complete .journey-dot {
      background: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .journey-item.is-active .journey-dot {
      background: var(--primary-dark);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
    }

    .journey-item.is-locked {
      opacity: 0.48;
    }

    .journey-item strong {
      display: block;
      font-size: 0.94rem;
    }

    .journey-item span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .journey-status {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .journey-item.is-complete .journey-status {
      color: var(--primary);
    }

    .journey-item.is-active .journey-status {
      color: var(--primary-dark);
    }

    .confidence-list {
      display: grid;
      gap: 14px;
    }

    .confidence-row {
      display: grid;
      gap: 8px;
    }

    .confidence-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .confidence-bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
    }

    .confidence-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
      animation: confidence-grow 0.9s ease forwards;
    }

    @keyframes confidence-grow {
      to {
        width: var(--value);
      }
    }

    .nova-feedback {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
    }

    .nova-feedback img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
    }

    .nova-feedback p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.16);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .badge-chip span {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: var(--primary);
      font-size: 0.72rem;
    }

    .time-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .time-stat {
      padding: 16px;
      border-radius: 16px;
      background: rgba(37, 99, 235, 0.06);
      border: 1px solid rgba(37, 99, 235, 0.1);
      text-align: center;
    }

    .time-stat strong {
      display: block;
      font-size: 1.45rem;
      letter-spacing: -0.03em;
      color: var(--primary);
    }

    .time-stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .insight-card {
      padding: 16px;
      border-radius: 16px;
      background: rgba(37, 99, 235, 0.05);
      border: 1px solid rgba(37, 99, 235, 0.1);
    }

    .insight-card h4 {
      margin: 0 0 10px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .insight-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--ink);
      line-height: 1.55;
    }

    .insight-card.is-practice h4 {
      color: var(--muted);
    }

    .insight-card p.placeholder-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .progress-summary-line {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .progress-summary-line strong {
      color: var(--ink);
    }

    .journey-empty {
      padding: 24px 16px;
      border-radius: 14px;
      background: rgba(37, 99, 235, 0.04);
      border: 1px dashed rgba(37, 99, 235, 0.18);
      text-align: center;
    }

    .journey-empty p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .achievements-empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .tutor-comment-block {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
    }

    .tutor-comment-block img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
    }

    .tutor-comment-block p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .next-step-button {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
      min-height: 62px;
      align-items: center;
      justify-content: center;
      padding: 16px 22px;
      border: 0;
      border-radius: 14px;
      color: #ffffff;
      background: #2563eb;
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.24);
      font: inherit;
      font-size: 1rem;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .next-step-button:hover,
    .next-step-button:focus-visible {
      transform: translateY(-2px);
      background: #1d4ed8;
      box-shadow: 0 20px 44px rgba(37, 99, 235, 0.28);
      outline: 4px solid rgba(37, 99, 235, 0.18);
      outline-offset: 3px;
    }

    .next-step-button small {
      display: block;
      margin-top: 2px;
      font-size: 0.78rem;
      font-weight: 700;

    function countKeywordHits(text, keywords) {
      const lower = (text || "").toLowerCase();
      return keywords.filter((word) => lower.includes(word.toLowerCase())).length;
    }

    const WRITTEN_LINK_WORD_PATTERN = /\bbecause\b|\btherefore\b|\bso that\b|\bthis means\b/i;
    const WRITTEN_BOTH_SIDES_CONTRAST = /\bhowever\b|\bon the other hand\b|\bdisadvantage\b|\bdrawback\b|\bwhereas\b|\bbut\b/i;
    const WRITTEN_BOTH_SIDES_POSITIVE = /\badvantage\b|\bbenefit\b|\bstrength\b/i;

    const WRITTEN_MIN_WORDS = {
      describe: 8,
      explain: 10,
      apply: 10,
      discuss: 12,
      list: 6
    };

    function tokenizeAnswerWords(text) {
      return (text || "").toLowerCase().match(/\b[a-z']{2,}\b/g) || [];
    }

    function isGibberishWord(word) {
      if (word.length >= 5 && !/[aeiouy]/i.test(word)) return true;
      if (/(.)\1{3,}/.test(word)) return true;
      if (word.length >= 8 && /[^aeiouy]{4,}/i.test(word)) return true;
      if (word.length > 12) {
        const uniqueChars = new Set(word.split("")).size;
        if (uniqueChars / word.length < 0.55) return true;
      }
      return false;
    }

    function hasGibberishContent(text) {
      const words = tokenizeAnswerWords(text);
      if (!words.length) return true;

      const gibberishCount = words.filter(isGibberishWord).length;
      if (gibberishCount >= 2 || (words.length >= 4 && gibberishCount / words.length >= 0.35)) {
        return true;
      }

      const unique = new Set(words);
      if (words.length >= 6 && unique.size / words.length < 0.45) return true;

      const counts = {};
      words.forEach((word) => {
        counts[word] = (counts[word] || 0) + 1;
      });
      const maxRepeat = Math.max(...Object.values(counts));
      if (maxRepeat >= 3 && maxRepeat / words.length >= 0.5) return true;

      return false;
    }

    function countMeaningfulWords(text) {
      return tokenizeAnswerWords(text).filter((word) => !isGibberishWord(word)).length;
    }

    function parseListAnswerLines(text) {
      return (text || "")
        .split("\n")
        .map((line) => line.replace(/^[\-\*•]\s*/, "").trim())
        .filter(Boolean);
    }

    function meetsWrittenLengthGate(task, trimmed) {
      if (task.responseType === "list") {
        const lines = parseListAnswerLines(trimmed);
        return lines.length >= (task.minItems || 2) && trimmed.length >= (task.minChars || 20);
      }
      return trimmed.length >= (task.minChars || 20);
    }

    function getWrittenQualityError(text, task) {
      const trimmed = (text || "").trim();
      if (!meetsWrittenLengthGate(task, trimmed)) return null;

      const defaultMessage = "Please write a real answer in full sentences before continuing.";

      if (task.responseType === "list") {
        const lines = parseListAnswerLines(trimmed);
        const normalizedLines = lines.map((line) => line.toLowerCase());
        if (new Set(normalizedLines).size < lines.length) {
          return "Each point should be different. Add separate lines for each responsibility.";
        }

        const weakLines = lines.filter((line) => countMeaningfulWords(line) < 2 || hasGibberishContent(line));
        if (weakLines.length) {
          return "Each point needs a short real phrase, not random letters. Put one responsibility on each line.";
        }

        if (countMeaningfulWords(trimmed) < (WRITTEN_MIN_WORDS.list || 6)) {
          return defaultMessage;
        }

        return null;
      }

      const minWords = WRITTEN_MIN_WORDS[task.commandWord] || 6;
      if (countMeaningfulWords(trimmed) < minWords) {
        return defaultMessage;
      }

      if (hasGibberishContent(trimmed)) {
        return defaultMessage;
      }

      if (task.requiresLinkWord && !WRITTEN_LINK_WORD_PATTERN.test(trimmed)) {
        return "Explain your reasoning using because, therefore, or a similar linking word.";
      }

      if (task.requiresBothSides) {
        const hasContrast = WRITTEN_BOTH_SIDES_CONTRAST.test(trimmed);
        const hasBothSides = WRITTEN_BOTH_SIDES_POSITIVE.test(trimmed) && hasContrast;
        if (!hasBothSides) {
          return "Discuss both an advantage and a disadvantage before continuing.";
        }
      }

      return null;
    }

    function isWrittenTask(task) {
      if (task.responseType === "mc" || task.type === "multiple_choice") return false;
      if (task.responseType === "short") return false;
      return task.type === "short_answer" || task.type === "scenario" || task.responseType === "paragraph"
        || task.responseType === "list" || task.responseType === "discuss";
    }

    function logFailedWrittenValidation(task, answer, reason) {
      if (!quizState.failedValidations) {
        quizState.failedValidations = [];
      }
      quizState.failedValidations.push({
        taskId: task.id,
        commandWord: task.commandWord,
        reason,
        answerLength: (answer || "").trim().length,
        at: new Date().toISOString()
      });
    }

    function scoreWrittenAnswer(text, task) {
      const trimmed = (text || "").trim();
      const maxScore = getItemMarkWeight(task);
      if (!trimmed) return 0;

      if (task.responseType === "list") {
        const lines = trimmed.split("\n").map((line) => line.replace(/^[\-\*•]\s*/, "").trim()).filter(Boolean);
        if (lines.length < (task.minItems || 2)) return 0;
        const hits = countKeywordHits(trimmed, task.keywords || []);
        if (hits >= (task.minKeywords || 2)) return maxScore;
        if (hits >= 1 || lines.length >= (task.minItems || 2)) return Math.max(maxScore * 0.5, 0.5);
        return 0;
      }

      if (trimmed.length < (task.minChars || 20)) return 0;

      const hits = countKeywordHits(trimmed, task.keywords || []);
      let score = 0;

      if (hits >= (task.minKeywords || 2)) {
        score = maxScore;
      } else if (hits >= 1) {
        score = Math.max(maxScore * 0.5, 0.5);
      }

      if (task.requiresLinkWord && !/\bbecause\b|\btherefore\b|\bso that\b|\bthis means\b/i.test(trimmed)) {
        score = Math.min(score, maxScore * 0.5);
      }

      if (task.requiresBothSides) {
        const hasContrast = /\bhowever\b|\bon the other hand\b|\bdisadvantage\b|\bdrawback\b|\bwhereas\b|\bbut\b/i.test(trimmed);
        const hasBothSides = /\badvantage\b|\bbenefit\b|\bstrength\b/i.test(trimmed) && hasContrast;
        if (!hasBothSides && score > 0) {
          score = Math.min(score, maxScore * 0.6);
        }
      }

      return score;
    }

    function scoreAssessmentItem(item, answer) {
      const maxScore = getItemMarkWeight(item);
      let score = 0;

      if (item.responseType === "mc" || item.type === "multiple_choice") {
        score = scoreMultipleChoice(answer, item);
      } else if (item.type === "scenario" || item.type === "short_answer") {
        score = scoreWrittenAnswer(answer, item);
      }

      return {
        id: item.id,
        stage: item.stage,
        commandWord: item.commandWord,
        commandTier: getCommandWordTier(item.commandWord),
        ao: item.ao,
        topic: item.topic,
        score,
        maxScore,
        pct: maxScore > 0 ? Math.round((score / maxScore) * 100) : 0
      };
    }

    function buildItemResults(stage1Answers, stage2Tasks, stage2Answers) {
      const stage1Results = stage1ScreeningQuestions.map((question, index) => {
        return scoreAssessmentItem({ ...question, stage: 1 }, stage1Answers[index]);
      });
      const stage2Results = stage2Tasks.map((task, index) => {
        return scoreAssessmentItem({ ...task, stage: 2 }, stage2Answers[index]);
      });
      return stage1Results.concat(stage2Results);
    }

    function buildCommandWordBreakdown(itemResults) {
      const byCommand = {};
      itemResults.forEach((item) => {
        if (!byCommand[item.commandWord]) {
          byCommand[item.commandWord] = { earned: 0, max: 0 };
        }
        byCommand[item.commandWord].earned += item.score;
        byCommand[item.commandWord].max += item.maxScore;
      });

      const strong = [];
      const developing = [];

      Object.keys(byCommand).sort((a, b) => getCommandWordTier(b) - getCommandWordTier(a)).forEach((word) => {
        const bucket = byCommand[word];
        const pct = bucket.max > 0 ? bucket.earned / bucket.max : 0;
        if (pct >= 0.7) {
          strong.push(word);
        } else {
          developing.push(word);
        }
      });

      return { strong, developing, byCommand };
    }

    function buildAoBreakdown(itemResults) {
      const aos = { AO1: { earned: 0, max: 0 }, AO2: { earned: 0, max: 0 }, AO3: { earned: 0, max: 0 } };
      itemResults.forEach((item) => {
        if (!aos[item.ao]) return;
        aos[item.ao].earned += item.score;
        aos[item.ao].max += item.maxScore;
      });
      return aos;
    }

    function calculateStage1Score(answers) {
      return stage1ScreeningQuestions.reduce((total, question, index) => {
        return total + scoreMultipleChoice(answers[index], question);
      }, 0);
    }

    function calculateStage2Score(tasks, answers) {
      return tasks.reduce((total, task, index) => {
        if (task.responseType === "mc" || task.type === "multiple_choice") {
          return total + scoreMultipleChoice(answers[index], task);
        }
        return total + scoreWrittenAnswer(answers[index], task);
      }, 0);
    }

    function calculateCombinedScore(stage1Score, stage2Score, stage2Tasks) {
      const stage1Max = getStage1MaxScore();
      const stage2Max = getStage2MaxScore(stage2Tasks);
      const w1 = assessmentFramework.placementPolicy.diagnosticStage1Weight;
      const w2 = assessmentFramework.placementPolicy.diagnosticStage2Weight;
      const normalized = (stage1Score / stage1Max) * w1 + (stage2Max > 0 ? (stage2Score / stage2Max) * w2 : 0);
      return Math.round(normalized * 100) / 10;
    }

    function buildSuggestionFromScores(stage1Score, stage2Score, stage2Tasks, itemResults) {
      const combinedScore = calculateCombinedScore(stage1Score, stage2Score, stage2Tasks);
      const tutorIndex = getTutorIndexForCombinedScore(combinedScore);
      const tutor = tutors[tutorIndex];
      const commandWordBreakdown = buildCommandWordBreakdown(itemResults);
      const aoBreakdown = buildAoBreakdown(itemResults);
      return {
        id: `placement-${Date.now()}`,
        studentName: CURRENT_STUDENT_NAME,
        tutorIndex,
        tutorName: tutor.name,
        level: tutor.level,
        image: tutor.image,
        support: tutor.support,
        stage1Score,
        stage1Max: getStage1MaxScore(),
        stage2Score,
        stage2Max: getStage2MaxScore(stage2Tasks),
        combinedScore,
        commandWordBreakdown,
        aoBreakdown,
        itemResults,
        status: "pending",
        assessmentStage: "diagnostic",
        completedAt: new Date().toISOString(),
        source: "placement-assessment"
      };
    }

    function getTutorIndexForCombinedScore(combinedScore) {
      const band = TUTOR_SCORE_BANDS.find((item) => combinedScore >= item.min && combinedScore <= item.max);
      return band ? band.tutorIndex : 0;
    }

    function getAssignedTutorPanelCopy(assignment) {
      return `Your tutor is ${assignment.tutorName} (${assignment.level}). Your teacher confirmed this tutor band after reviewing your placement assessment.`;
    }

    function getSuggestedTutorPanelCopy(suggestion) {
      return `Suggested tutor: ${suggestion.tutorName} (${suggestion.level}). Your teacher will review this placement before it is confirmed.`;
    }

    function renderAssignedTutorBanner(assignment) {
      const tutor = tutors[assignment.tutorIndex];
      return `
        <div class="tutor-assignment" aria-live="polite">
          <div class="assigned-tutor-badge">
            <img src="${tutor.image}" alt="">
            Confirmed tutor: <span>${assignment.tutorName}</span> · ${assignment.level}
          </div>
          <button class="retake-quiz-link" type="button" id="retake-tutor-quiz">Retake placement assessment</button>
        </div>
      `;
    }

    function renderSuggestedTutorBanner(suggestion) {
      const tutor = tutors[suggestion.tutorIndex];
      return `
        <div class="tutor-assignment" aria-live="polite">
          <div class="suggested-tutor-badge">
            <img src="${tutor.image}" alt="">
            Suggested tutor: <span>${suggestion.tutorName}</span> · ${suggestion.level}
          </div>
          <span class="pending-confirmation-badge">Pending teacher confirmation</span>
          <button class="retake-quiz-link" type="button" id="retake-tutor-quiz">Retake placement assessment</button>
        </div>
      `;
    }

    function bindTutorPanelActions() {
      const quizButton = panelContent.querySelector(".quiz-button");
      const retakeButton = panelContent.querySelector("#retake-tutor-quiz");

      if (quizButton) {
        quizButton.addEventListener("click", () => openTutorQuiz());
      }

      if (retakeButton) {
        retakeButton.addEventListener("click", () => openTutorQuiz(true));
      }
    }

    function renderTutorPanel(title, copy) {
      panelContent.classList.remove("is-progress", "is-home");
      panelContent.classList.add("is-wide");
      const assignment = loadAssignedTutor();
      const suggestion = loadSuggestedTutor();
      const isPreQuiz = !assignment && !suggestion;

      let panelCopy = copy;
      let bannerHtml = "";
      let quizButtonLabel = "Take Citizenship Placement Assessment";
      let quizActionClass = "quiz-action is-prominent";
      let gridClass = "";
      let gateMessage = "";

      if (assignment) {
        panelCopy = getAssignedTutorPanelCopy(assignment);
        bannerHtml = renderAssignedTutorBanner(assignment);
        quizButtonLabel = "Retake Placement Assessment";
        quizActionClass = "quiz-action";
      } else if (suggestion) {
        panelCopy = getSuggestedTutorPanelCopy(suggestion);
        bannerHtml = renderSuggestedTutorBanner(suggestion);
        quizButtonLabel = "Retake Placement Assessment";
        quizActionClass = "quiz-action";
      } else {
        panelCopy = "Complete the citizenship placement assessment first so we can suggest the right tutor for you.";
        gridClass = " is-quiz-gated";
        gateMessage = `<p class="quiz-gate-message">Complete the placement assessment first to see tutor options.</p>`;
      }

      const highlightIndex = assignment ? assignment.tutorIndex : suggestion ? suggestion.tutorIndex : null;
      const highlightClass = assignment ? " is-assigned" : suggestion ? " is-suggested" : "";

      panelContent.innerHTML = `
        <h2 id="panel-title">${title}</h2>
        <p id="panel-copy" class="tutor-panel-intro">${panelCopy}</p>
        ${isPreQuiz ? `
          <div class="${quizActionClass}">
            <button class="quiz-button" type="button">${quizButtonLabel}</button>
          </div>
        ` : ""}
        ${bannerHtml}
        <div class="tutor-grid${gridClass}"${isPreQuiz ? ' aria-hidden="true"' : ""}>
          ${tutors.map((tutor, index) => `
            <article class="tutor-card${highlightIndex === index ? highlightClass : ""}">
              <div class="tutor-card-header">
                ${tutorAvatar(tutor)}
                <h3>${tutor.name}</h3>
              </div>
            </article>
          `).join("")}
        </div>
        ${gateMessage}
        ${!isPreQuiz ? `
          <div class="${quizActionClass}">
            <button class="quiz-button" type="button">${quizButtonLabel}</button>
          </div>
        ` : ""}
      `;

      bindTutorPanelActions();
    }

    function setQuizProgress(currentStep, totalSteps, labelText) {
      const percent = totalSteps > 0 ? Math.round((currentStep / totalSteps) * 100) : 0;
      quizProgressLabel.textContent = labelText;
      quizProgressFill.style.width = `${percent}%`;
    }

    function resetQuizState() {
      quizState = {
        screen: "start",
        stage: 1,
        questionIndex: 0,
        stage1Answers: new Array(stage1ScreeningQuestions.length).fill(null),
        stage2Tasks: [],
        stage2Answers: [],
        pendingResult: null,
        failedValidations: []
      };
    }

    function openTutorQuiz(isRetake) {
      resetQuizState();
      quizOverlay.hidden = false;
      quizOverlay.classList.add("is-open");
      quizOverlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      renderQuizScreen(isRetake ? "retake" : "start");
    }

    function closeTutorQuiz() {
      quizOverlay.classList.remove("is-open");
      quizOverlay.hidden = true;
      quizOverlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function renderQuizScreen(mode) {
      quizState.screen = mode === "retake" ? "start" : mode;

      if (quizState.screen === "start") {
        renderQuizStart(mode === "retake");
        return;
      }

      if (quizState.screen === "stage1") {
        renderStage1Question();
        return;
      }

      if (quizState.screen === "stage2") {
        renderStage2Task();
        return;
      }

      if (quizState.screen === "result") {
        renderQuizResult();
      }
    }

    function renderQuizStart(isRetake) {
      const totalSteps = stage1ScreeningQuestions.length + 3;
      setQuizProgress(0, totalSteps, "Ready to begin");
      quizModalBody.innerHTML = `
        <div class="quiz-start-screen">
          <span class="quiz-topic-tag">Citizenship placement assessment</span>
          <h3 class="quiz-question-text" id="quiz-modal-title">${isRetake ? "Retake placement assessment" : "GCSE Citizenship placement assessment"}</h3>
          <p>This is a two-stage GCSE Citizenship placement assessment using exam-style command words (identify, describe, explain, apply, discuss, and others). Stage 1 screens knowledge across core themes. Stage 2 adds written tasks matched to your Stage 1 performance.</p>
          <p>${assessmentFramework.placementPolicy.notClaimed} Your teacher will confirm or adjust your suggested tutor band after reviewing your responses.</p>
        </div>
      `;
      quizBackButton.disabled = true;
      quizBackButton.hidden = true;
      quizNextButton.disabled = false;
      quizNextButton.textContent = "Start Stage 1";
    }

    function renderStage1Question() {
      const question = stage1ScreeningQuestions[quizState.questionIndex];
      const selected = quizState.stage1Answers[quizState.questionIndex];
      const step = quizState.questionIndex + 1;
      const totalSteps = getTotalQuizSteps() || stage1ScreeningQuestions.length + 3;

      setQuizProgress(step, totalSteps, `Stage 1 · Screening · ${step} of ${stage1ScreeningQuestions.length}`);

      quizModalBody.innerHTML = `
        <div class="quiz-step">
          <span class="quiz-stage-label">Stage 1 · AO1 screening</span>
          ${renderQuestionMeta(question)}
          <p class="quiz-response-hint">${getResponseHint(question)}</p>
          <h3 class="quiz-question-text" id="quiz-modal-title">${question.question}</h3>
          <div class="quiz-options" role="listbox" aria-label="Answer options">
            ${question.options.map((option, index) => `
              <button
                class="quiz-option${selected === index ? " is-selected" : ""}"
                type="button"
                data-option-index="${index}"
                role="option"
                aria-selected="${selected === index}"
              >
                <span class="quiz-option-marker">${String.fromCharCode(65 + index)}</span>
                <span class="quiz-option-label">${option}</span>
              </button>
            `).join("")}
          </div>
        </div>
      `;

      quizBackButton.hidden = false;
      quizBackButton.disabled = quizState.questionIndex === 0;
      quizNextButton.disabled = selected === null;
      quizNextButton.textContent = quizState.questionIndex === stage1ScreeningQuestions.length - 1 ? "Continue to Stage 2" : "Next";

      quizModalBody.querySelectorAll(".quiz-option").forEach((button) => {
        button.addEventListener("click", () => {
          quizState.stage1Answers[quizState.questionIndex] = Number(button.dataset.optionIndex);
          renderStage1Question();
        });
      });
    }

    function isStage2AnswerValid(task, answer) {
      if (task.responseType === "mc" || task.type === "multiple_choice") {
        return answer !== null && answer !== undefined;
      }
      if (task.responseType === "short") {
        return Boolean((answer || "").trim());
      }
      const trimmed = (answer || "").trim();
      if (!meetsWrittenLengthGate(task, trimmed)) return false;
      return getWrittenQualityError(trimmed, task) === null;
    }

    function showStage2FieldError(message) {
      const errorEl = quizModalBody.querySelector(".quiz-field-error");
      if (!errorEl) return;
      if (message) {
        errorEl.textContent = message;
        errorEl.hidden = false;
      } else {
        errorEl.textContent = "";
        errorEl.hidden = true;
      }
    }

    function renderStage2Task() {
      const task = quizState.stage2Tasks[quizState.questionIndex];
      const answer = quizState.stage2Answers[quizState.questionIndex];
      const step = stage1ScreeningQuestions.length + quizState.questionIndex + 1;
      const totalSteps = getTotalQuizSteps();

      setQuizProgress(step, totalSteps, `Stage 2 · Written tasks · ${quizState.questionIndex + 1} of ${quizState.stage2Tasks.length}`);

      let bodyHtml = `
        <div class="quiz-step">
          <span class="quiz-stage-label">Stage 2 · Command-word tasks</span>
          ${renderQuestionMeta(task)}
      `;

      if (task.scenario) {
        bodyHtml += `<div class="quiz-scenario-box">${task.scenario}</div>`;
      }

      bodyHtml += `
          <p class="quiz-response-hint">${getResponseHint(task)}</p>
          <h3 class="quiz-question-text" id="quiz-modal-title">${task.question}</h3>
      `;

      if (task.responseType === "mc" || task.type === "multiple_choice") {
        bodyHtml += `
          <div class="quiz-options" role="listbox" aria-label="Answer options">
            ${task.options.map((option, index) => `
              <button
                class="quiz-option${answer === index ? " is-selected" : ""}"
                type="button"
                data-option-index="${index}"
                role="option"
                aria-selected="${answer === index}"
              >
                <span class="quiz-option-marker">${String.fromCharCode(65 + index)}</span>
                <span class="quiz-option-label">${option}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else if (task.responseType === "short") {
        bodyHtml += `
          <input class="quiz-short-input" id="quiz-short-answer" type="text" value="${answer || ""}" placeholder="Type your answer here" aria-label="Your answer">
          <p class="quiz-char-hint">Short phrase or one word only</p>
        `;
      } else {
        const charCount = (answer || "").trim().length;
        const isValid = isStage2AnswerValid(task, answer);
        const listPlaceholder = task.responseType === "list"
          ? "Point 1\nPoint 2\nPoint 3"
          : "Write your answer in full sentences...";
        bodyHtml += `
          <textarea class="quiz-textarea" id="quiz-short-answer" placeholder="${listPlaceholder}" aria-label="Your answer">${answer || ""}</textarea>
          <p class="quiz-char-hint${isValid ? " is-valid" : ""}">${charCount} / ${task.minChars} characters minimum${task.responseType === "list" ? ` · ${(answer || "").split("\n").filter((line) => line.trim()).length} / ${task.minItems || 3} points` : ""}</p>
          <p class="quiz-field-error" hidden role="alert"></p>
        `;
      }

      bodyHtml += `</div>`;
      quizModalBody.innerHTML = bodyHtml;

      quizBackButton.hidden = false;
      quizBackButton.disabled = false;

      const isMc = task.responseType === "mc" || task.type === "multiple_choice";
      if (isMc) {
        quizNextButton.disabled = answer === null || answer === undefined;
        quizModalBody.querySelectorAll(".quiz-option").forEach((button) => {
          button.addEventListener("click", () => {
            quizState.stage2Answers[quizState.questionIndex] = Number(button.dataset.optionIndex);
            renderStage2Task();
          });
        });
      } else {
        const field = quizModalBody.querySelector("#quiz-short-answer");
        const updateAnswer = () => {
          quizState.stage2Answers[quizState.questionIndex] = field.value;
          const trimmed = field.value.trim();
          const lengthReady = meetsWrittenLengthGate(task, trimmed);
          const qualityError = lengthReady ? getWrittenQualityError(trimmed, task) : null;
          const valid = isStage2AnswerValid(task, field.value);
          quizNextButton.disabled = !valid;
          const hint = quizModalBody.querySelector(".quiz-char-hint");
          if (task.responseType === "list") {
            const lineCount = field.value.split("\n").filter((line) => line.trim()).length;
            hint.textContent = `${field.value.trim().length} / ${task.minChars} characters minimum · ${lineCount} / ${task.minItems || 3} points`;
          } else if (task.responseType !== "short") {
            hint.textContent = `${field.value.trim().length} / ${task.minChars} characters minimum`;
          }
          hint.classList.toggle("is-valid", valid);
          if (valid || !lengthReady) {
            showStage2FieldError(null);
          } else if (qualityError) {
            showStage2FieldError(qualityError);
          }
        };
        field.addEventListener("input", updateAnswer);
        quizNextButton.disabled = !isStage2AnswerValid(task, answer);
        if (isWrittenTask(task) && answer) {
          const trimmed = (answer || "").trim();
          const qualityError = meetsWrittenLengthGate(task, trimmed) ? getWrittenQualityError(trimmed, task) : null;
          if (qualityError) showStage2FieldError(qualityError);
        }
      }

      quizNextButton.textContent = quizState.questionIndex === quizState.stage2Tasks.length - 1 ? "View placement result" : "Next";
    }

    function formatCommandWordList(words) {
      if (!words.length) return "None recorded yet";
      return words.map((word) => capitalizeCommandWord(word)).join(", ");
    }

    function renderQuizResult() {
      const stage1Score = calculateStage1Score(quizState.stage1Answers);
      const stage2Score = calculateStage2Score(quizState.stage2Tasks, quizState.stage2Answers);
      const itemResults = buildItemResults(quizState.stage1Answers, quizState.stage2Tasks, quizState.stage2Answers);
      const suggestion = buildSuggestionFromScores(stage1Score, stage2Score, quizState.stage2Tasks, itemResults);
      quizState.pendingResult = suggestion;

      const { strong, developing } = suggestion.commandWordBreakdown;
      const aoLines = ["AO1", "AO2", "AO3"].map((ao) => {
        const bucket = suggestion.aoBreakdown[ao];
        if (!bucket || bucket.max === 0) return `${ao}: not assessed`;
        return `${ao}: ${Math.round(bucket.earned)}/${Math.round(bucket.max)} marks`;
      }).join(" · ");

      setQuizProgress(getTotalQuizSteps(), getTotalQuizSteps(), "Assessment complete");

      quizModalBody.innerHTML = `
        <div class="quiz-result">
          <div class="quiz-result-avatar">
            <img src="${suggestion.image}" alt="">
          </div>
          <p class="quiz-result-level">${suggestion.level}</p>
          <h3 id="quiz-modal-title">Suggested tutor: ${suggestion.tutorName}</h3>
          <p class="quiz-result-score">
            Stage 1: ${stage1Score}/${suggestion.stage1Max} · Stage 2: ${stage2Score}/${suggestion.stage2Max} · Combined: ${suggestion.combinedScore}/10
          </p>
          <div class="quiz-result-breakdown">
            <h4>Command word performance</h4>
            <p><strong>Strong at:</strong> ${formatCommandWordList(strong)}</p>
            <p><strong>Developing:</strong> ${formatCommandWordList(developing)}</p>
            <p class="quiz-result-ao">${aoLines}</p>
          </div>
          <p>${suggestion.support}</p>
          <p>This is a suggested tutor band, not an official GCSE grade. Your teacher will confirm or adjust your placement on the staff dashboard.</p>
        </div>
      `;

      quizBackButton.hidden = false;
      quizBackButton.disabled = false;
      quizNextButton.disabled = false;
      quizNextButton.textContent = "Submit for teacher review";
    }

    function handleQuizNext() {
      if (quizState.screen === "start") {
        quizState.screen = "stage1";
        quizState.stage = 1;
        renderStage1Question();
        return;
      }

      if (quizState.screen === "stage1") {
        if (quizState.questionIndex < stage1ScreeningQuestions.length - 1) {
          quizState.questionIndex += 1;
          renderStage1Question();
          return;
        }

        const stage1Score = calculateStage1Score(quizState.stage1Answers);
        quizState.stage2Tasks = selectStage2Tasks(stage1Score);
        quizState.stage2Answers = new Array(quizState.stage2Tasks.length).fill(null);
        quizState.stage = 2;
        quizState.screen = "stage2";
        quizState.questionIndex = 0;
        renderStage2Task();
        return;
      }

      if (quizState.screen === "stage2") {
        const task = quizState.stage2Tasks[quizState.questionIndex];
        const answer = quizState.stage2Answers[quizState.questionIndex];

        if (isWrittenTask(task)) {
          const trimmed = (answer || "").trim();
          const qualityError = meetsWrittenLengthGate(task, trimmed)
            ? getWrittenQualityError(trimmed, task)
            : "Please write a real answer in full sentences before continuing.";
          if (!isStage2AnswerValid(task, answer)) {
            if (qualityError) {
              showStage2FieldError(qualityError);
              logFailedWrittenValidation(task, answer, qualityError);
            }
            return;
          }
        }

        if (quizState.questionIndex < quizState.stage2Tasks.length - 1) {
          quizState.questionIndex += 1;
          renderStage2Task();
          return;
        }

        quizState.screen = "result";
        renderQuizResult();
        return;
      }

      if (quizState.screen === "result" && quizState.pendingResult) {
        saveSuggestedTutor(quizState.pendingResult);
        closeTutorQuiz();
        const tutorTab = document.querySelector('.tab[data-view="tutors"]');
        if (tutorTab) {
          tabs.forEach((item) => item.classList.remove("active"));
          tutorTab.classList.add("active");
          renderTutorPanel(tutorTab.dataset.title, tutorTab.dataset.copy);
        }
      }
    }

    function handleQuizBack() {
      if (quizState.screen === "result") {
        quizState.screen = "stage2";
        quizState.questionIndex = quizState.stage2Tasks.length - 1;
        renderStage2Task();
        return;
      }

      if (quizState.screen === "stage2") {
        if (quizState.questionIndex > 0) {
          quizState.questionIndex -= 1;
          renderStage2Task();
          return;
        }

        quizState.screen = "stage1";
        quizState.stage = 1;
        quizState.questionIndex = stage1ScreeningQuestions.length - 1;
        renderStage1Question();
        return;
      }

      if (quizState.screen === "stage1" && quizState.questionIndex > 0) {
        quizState.questionIndex -= 1;
        renderStage1Question();
      }
    }

    quizNextButton.addEventListener("click", handleQuizNext);
    quizBackButton.addEventListener("click", handleQuizBack);
    quizCloseButton.addEventListener("click", () => {
      const hasProgress = quizState.stage1Answers.some((a) => a !== null)
        || quizState.stage2Answers.some((a) => a !== null && a !== "");
      if (quizState.screen !== "start" && quizState.screen !== "result" && hasProgress) {
        const shouldClose = window.confirm("Close the assessment? Your current answers will be lost.");
        if (!shouldClose) return;
      }
      closeTutorQuiz();
    });

    quizOverlay.addEventListener("click", (event) => {
      if (event.target === quizOverlay) {
        quizCloseButton.click();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!quizOverlay.classList.contains("is-open")) return;
      if (event.key === "Escape") {
        quizCloseButton.click();
      }
    });

    function getActiveTutorSlug() {
      const assignment = loadAssignedTutor();
      if (assignment && tutors[assignment.tutorIndex]) {
        return tutors[assignment.tutorIndex].name.toLowerCase();
      }

      const suggestion = loadSuggestedTutor();
      if (suggestion && tutors[suggestion.tutorIndex]) {
        return tutors[suggestion.tutorIndex].name.toLowerCase();
      }

      return "nova";
    }

    function getLessonTemplateHref() {
      return `lesson.html?tutor=${encodeURIComponent(getActiveTutorSlug())}`;
    }

    const demoTrialSessions = [
      { id: 1, title: "Rights in School: What Is a Right?" },
      { id: 2, title: "School Rules: Rights vs Responsibilities" },
      { id: 3, title: "What Is Democracy?" },
      { id: 4, title: "Elections and Voting" },
      { id: 5, title: "Identity and Diversity in Modern Britain" },
      { id: 6, title: "Why Do We Have Laws?" },
      { id: 7, title: "Youth Justice and Sentencing" },
      { id: 8, title: "Active Citizenship: Choose Your Issue" }
    ];

    function renderDemoSessionCards() {
      return demoTrialSessions.map((session) => `
        <div class="demo-session-card" aria-disabled="true">
          <span class="demo-session-number">${session.id}</span>
          <strong>${session.title}</strong>
        </div>
      `).join("");
    }

    function renderLessonPanel() {
      panelContent.classList.remove("is-progress", "is-home");
      panelContent.classList.add("is-wide");
      panelContent.innerHTML = `
        <h2 id="panel-title">Lessons</h2>
        <p id="panel-copy">Open the full-screen lesson template.</p>
        <div class="lesson-launch">
          <a class="lesson-launch-button" href="${getLessonTemplateHref()}" target="_blank" rel="noopener">View Lesson Template</a>
        </div>
        <section class="demo-sessions-section" aria-label="Demo trial schedule">
          <h3 class="demo-sessions-heading">Demo trial schedule</h3>
          <p class="demo-sessions-note">Eight 40-minute sessions across four weeks. Sessions will unlock for the trial.</p>
          <div class="demo-sessions-grid">
            ${renderDemoSessionCards()}
          </div>
        </section>
      `;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");

        if (tab.dataset.view === "home") {
          renderHomePanel();
          return;
        }

        if (tab.dataset.view === "tutors") {
          renderTutorPanel(tab.dataset.title, tab.dataset.copy);
          return;
        }

        if (tab.dataset.view === "lesson") {
          renderLessonPanel();
          return;
        }

        if (tab.dataset.view === "progress") {
          renderProgressPanel();
          return;
        }

        renderStandardPanel(tab.dataset.title, tab.dataset.copy);
      });
    });

    renderHomePanel();

    document.getElementById("student-logout").addEventListener("click", () => {
      EvoAuth.logout("student");
    });
  </script>
</body>
</html>
