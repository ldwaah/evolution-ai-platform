<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Academy Campus — Cinematic Fly-Through</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: rgba(18, 18, 22, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8ec;
      --muted: #8a8a96;
      --accent: #c9a962;
      --accent-dim: rgba(201, 169, 98, 0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .frame-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }

    .frame-layer.active {
      opacity: 1;
      z-index: 2;
    }

    .frame-layer.fading-out {
      opacity: 0;
      z-index: 1;
    }

    .frame-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(ellipse 80% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 18%, transparent 82%, rgba(0,0,0,0.5) 100%);
    }

    .letterbox-top,
    .letterbox-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 5vh;
      background: #000;
      z-index: 11;
      pointer-events: none;
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 6vh 4vw;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .title-block h1 {
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .title-block p {
      font-size: clamp(0.65rem, 1.1vw, 0.8rem);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .frame-counter {
      font-variant-numeric: tabular-nums;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1;
      color: rgba(255,255,255,0.12);
    }

    .frame-counter .current {
      color: var(--text);
    }

    .frame-label {
      position: absolute;
      bottom: 14vh;
      left: 4vw;
      right: 4vw;
      text-align: center;
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .frame-label.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .controls {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 0.85rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      align-self: center;
      margin-bottom: 2vh;
    }

    .btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .btn:active { transform: scale(0.92); }

    .btn-play {
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border: 1px solid rgba(201, 169, 98, 0.35);
    }

    .btn-play:hover {
      background: rgba(201, 169, 98, 0.4);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .btn-play svg { width: 20px; height: 20px; }

    .progress-track {
      width: min(200px, 30vw);
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    .speed-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      min-width: 2.5rem;
      text-align: center;
    }

    .progress-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.3s, transform 0.2s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    .dot:hover { background: rgba(201, 169, 98, 0.6); }

    @media (max-width: 600px) {
      .hud { padding: 5vh 5vw; }
      .progress-track { width: 100px; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>
    <div class="vignette"></div>

    <div class="hud">
      <div class="hud-top">
        <div class="title-block">
          <h1>Evolution Sports Academy</h1>
          <p>Cinematic Campus Fly-Through</p>
        </div>
        <div class="frame-counter" aria-live="polite">
          <span class="current" id="frameNum">01</span><span>/06</span>
        </div>
      </div>

      <div class="frame-label visible" id="frameLabel">Establishing — Twilight Campus</div>

      <div class="controls">
        <button class="btn" id="btnPrev" aria-label="Previous frame" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>

        <div class="progress-dots" id="dots"></div>

        <button class="btn btn-play" id="btnPlay" aria-label="Play" title="Play / Pause">
          <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <button class="btn" id="btnNext" aria-label="Next frame" title="Next">
          <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const FRAMES = [
      { src: 'test-room-frames/frame-01.png', label: 'Establishing — Twilight Campus' },
      { src: 'test-room-frames/frame-02.png', label: 'Approach — Grey Brick Walkway' },
      { src: 'test-room-frames/frame-03.png', label: 'Entrance — Glass Facade' },
      { src: 'test-room-frames/frame-04.png', label: 'Threshold — Double Doors' },
      { src: 'test-room-frames/frame-05.png', label: 'Transition — Passing Through Glass' },
      { src: 'test-room-frames/frame-06.png', label: 'Interior — Premium Lobby' },
    ];

    const INTERVAL_MS = 3200;
    const FADE_MS = 1400;

    const stage = document.getElementById('stage');
    const frameNum = document.getElementById('frameNum');
    const frameLabel = document.getElementById('frameLabel');
    const progressFill = document.getElementById('progressFill');
    const btnPlay = document.getElementById('btnPlay');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const dotsContainer = document.getElementById('dots');

    let currentIndex = 0;
    let playing = true;
    let timer = null;
    let layers = [];

    function pad(n) { return String(n).padStart(2, '0'); }

    function buildLayers() {
      FRAMES.forEach((frame, i) => {
        const layer = document.createElement('div');
        layer.className = 'frame-layer' + (i === 0 ? ' active' : '');
        layer.dataset.index = i;

        const img = document.createElement('img');
        img.src = frame.src;
        img.alt = `Frame ${pad(i + 1)}: ${frame.label}`;
        img.draggable = false;

        layer.appendChild(img);
        stage.insertBefore(layer, stage.firstChild);
        layers.push(layer);

        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Go to frame ${i + 1}`);
        dot.addEventListener('click', () => goTo(i, true));
        dotsContainer.appendChild(dot);
      });
    }

    function updateUI() {
      frameNum.textContent = pad(currentIndex + 1);
      progressFill.style.width = ((currentIndex + 1) / FRAMES.length * 100) + '%';

      frameLabel.classList.remove('visible');
      setTimeout(() => {
        frameLabel.textContent = FRAMES[currentIndex].label;
        frameLabel.classList.add('visible');
      }, 200);

      dotsContainer.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function goTo(index, pauseOnManual = false) {
      if (index === currentIndex || index < 0 || index >= FRAMES.length) return;

      const prev = layers[currentIndex];
      const next = layers[index];

      prev.classList.remove('active');
      prev.classList.add('fading-out');

      next.classList.add('active');
      next.classList.remove('fading-out');

      setTimeout(() => prev.classList.remove('fading-out'), FADE_MS);

      currentIndex = index;
      updateUI();

      if (pauseOnManual) pause();
      else if (playing) scheduleNext();
    }

    function next() {
      const nextIndex = (currentIndex + 1) % FRAMES.length;
      goTo(nextIndex);
    }

    function prev() {
      const prevIndex = (currentIndex - 1 + FRAMES.length) % FRAMES.length;
      goTo(prevIndex, true);
    }

    function scheduleNext() {
      clearTimeout(timer);
      timer = setTimeout(next, INTERVAL_MS);
    }

    function play() {
      playing = true;
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
      btnPlay.setAttribute('aria-label', 'Pause');
      scheduleNext();
    }

    function pause() {
      playing = false;
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
      btnPlay.setAttribute('aria-label', 'Play');
      clearTimeout(timer);
    }

    btnPlay.addEventListener('click', () => playing ? pause() : play());
    btnNext.addEventListener('click', () => { next(); pause(); });
    btnPrev.addEventListener('click', prev);

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ') { e.preventDefault(); playing ? pause() : play(); }
      if (e.key === 'ArrowRight') { next(); pause(); }
      if (e.key === 'ArrowLeft') prev();
    });

    buildLayers();
    updateUI();
    play();
  </script>
</body>
</html>
