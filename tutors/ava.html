<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EVOlearn — Ava, Building Confidence tutor</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../assets/css/tutor-ava.css" />
  <style>
    .ava-profile-page { min-height: 100vh; display: flex; flex-direction: column; }
    .ava-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 26px; position: relative; z-index: 2;
    }
    .ava-topbar .brand-logo { height: 38px; width: auto; display: block; }
    .ava-back {
      color: var(--muted); font-size: 14px; text-decoration: none;
      padding: 8px 14px; border-radius: 999px; border: 1px solid var(--glass-line);
      background: rgba(255,255,255,.04); backdrop-filter: blur(10px);
      transition: color .75s cubic-bezier(.22,.61,.36,1), border-color .75s cubic-bezier(.22,.61,.36,1);
    }
    .ava-back:hover { color: var(--cyan); border-color: rgba(90,217,255,.5); }

    .ava-shell { flex: 1; max-width: 920px; width: 100%; margin: 0 auto; padding: 14px 26px 48px; position: relative; z-index: 1; }

    .ava-hero {
      display: grid; grid-template-columns: 200px 1fr; gap: 28px; align-items: center;
      margin-bottom: 36px;
    }
    .ava-hero-photo {
      position: relative; border-radius: 22px; overflow: hidden; aspect-ratio: 1;
      border: 1px solid rgba(140,210,230,.18); background: var(--navy-deep);
    }
    .ava-hero-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ava-hero-badge {
      position: absolute; top: 10px; left: 10px;
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(13,22,30,.75); color: var(--cyan-soft);
      border: 1px solid var(--glass-line); backdrop-filter: blur(6px);
    }
    .ava-hero-copy h1 { font-size: clamp(28px, 4vw, 40px); font-weight: 600; letter-spacing: -.5px; }
    .ava-hero-role { font-size: 14px; color: var(--cyan); letter-spacing: .4px; margin-top: 4px; }
    .ava-catchphrase {
      font-size: 16px; color: var(--cyan-soft); margin-top: 14px; font-style: italic;
    }
    .ava-hero-support { font-size: 15px; color: var(--muted); margin-top: 10px; line-height: 1.55; max-width: 520px; }

    .ava-section { margin-bottom: 32px; }
    .ava-section h2 {
      font-size: 13px; letter-spacing: 1.6px; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 14px; font-weight: 600;
    }
    .ava-section p, .ava-section li { font-size: 15px; line-height: 1.65; color: #cfe1ec; }
    .ava-section ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .ava-section ul li::before { content: "·"; color: var(--cyan); margin-right: 10px; }

    .ava-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .ava-tag {
      font-size: 13px; padding: 6px 12px; border-radius: 999px;
      border: 1px solid rgba(140,210,230,.18); background: rgba(255,248,242,.05);
      color: var(--cyan-soft); backdrop-filter: blur(8px);
    }

    .ava-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .ava-card {
      border-radius: 20px; border: 1px solid rgba(140,210,230,.18);
      background: rgba(255,248,242,.05); backdrop-filter: blur(12px); padding: 18px 20px;
    }
    .ava-card h3 { font-size: 14px; color: var(--cyan); margin-bottom: 10px; font-weight: 600; }

    .ava-examples { display: flex; flex-direction: column; gap: 14px; }
    .ava-example-card {
      border-radius: 18px; border: 1px solid rgba(140,210,230,.16);
      background: rgba(255,255,255,.04); padding: 16px 18px;
    }
    .ava-example-label {
      font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; display: block;
    }
    .ava-example-text { font-size: 14.5px; line-height: 1.6; color: #d8e8f2; }
    .ava-example-list { display: flex; flex-direction: column; gap: 10px; }
    .ava-example-list p {
      font-size: 14.5px; line-height: 1.6; color: #d8e8f2;
      padding: 10px 14px; border-radius: 14px;
      background: rgba(90,217,255,.06); border: 1px solid rgba(127,227,255,.12);
    }

    .ava-dialogue { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .ava-dialogue-line {
      padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55;
    }
    .ava-dialogue-line--ava {
      align-self: flex-start; max-width: 92%;
      background: rgba(90,217,255,.09); border: 1px solid rgba(127,227,255,.18); color: #e8f4fb;
    }
    .ava-dialogue-line--student {
      align-self: flex-end; max-width: 72%;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #eaf4fb;
    }
    .ava-dialogue-role {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px; display: block;
    }

    .ava-footer-cta { margin-top: 12px; text-align: center; }
    .ava-cta {
      display: inline-block; padding: 14px 30px; border-radius: 999px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      background: linear-gradient(120deg, var(--cyan), var(--blue)); color: #06222e;
      box-shadow: 0 14px 36px rgba(90,217,255,.22);
      transition: transform .75s cubic-bezier(.22,.61,.36,1), box-shadow .75s cubic-bezier(.22,.61,.36,1);
    }
    .ava-cta:hover { transform: translateY(-2px); box-shadow: 0 18px 44px rgba(90,217,255,.32); }

    @media (max-width: 680px) {
      .ava-hero { grid-template-columns: 1fr; text-align: center; }
      .ava-hero-photo { max-width: 180px; margin: 0 auto; }
      .ava-hero-support { margin-left: auto; margin-right: auto; }
      .ava-grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="agent-ava ava-profile-page">
  <canvas id="particles"></canvas>
  <div class="ambient-glow"></div>

  <div class="ava-profile-page">
    <header class="ava-topbar">
      <a href="../index.html#citizenship" aria-label="Home">
        <img class="brand-logo" src="../assets/logo.svg" alt="EVOlearn" />
      </a>
      <a class="ava-back" href="citizenship.html">← All tutors</a>
    </header>

    <main class="ava-shell" id="ava-profile-root">
      <p style="color:var(--muted);text-align:center;padding:40px 0;">Loading Ava's profile…</p>
    </main>
  </div>

  <script>
    (function () {
      const root = document.getElementById("ava-profile-root");

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderList(items, className) {
        if (!items || !items.length) return "";
        return `<div class="${className}">${items.map((item) => `<p>${escapeHtml(item)}</p>`).join("")}</div>`;
      }

      function render(profile) {
        const ex = profile.examples || {};
        const bio = profile.biography || {};
        const style = profile.supportStyle || {};
        const coaching = profile.confidenceCoaching || {};
        const reinforcement = profile.positiveReinforcement || {};
        const dialogue = ex.lessonDialogue || [];

        root.innerHTML = `
          <section class="ava-hero">
            <div class="ava-hero-photo tutor-ava">
              <span class="ava-hero-badge">Lvl ${profile.level}</span>
              <img src="../${profile.image}" alt="${escapeHtml(profile.name)}, ${escapeHtml(profile.levelName)} tutor" />
            </div>
            <div class="ava-hero-copy">
              <h1>${escapeHtml(profile.name)}</h1>
              <p class="ava-hero-role">Level ${profile.level} · ${escapeHtml(profile.levelName)} · ${escapeHtml(profile.role)}</p>
              <p class="ava-catchphrase">"${escapeHtml(profile.catchphrase)}"</p>
              <p class="ava-hero-support">${escapeHtml(profile.description)}</p>
            </div>
          </section>

          <section class="ava-section">
            <h2>About Ava</h2>
            <p>${escapeHtml(bio.expanded || bio.short || "")}</p>
          </section>

          <section class="ava-section">
            <h2>Personality</h2>
            <div class="ava-tags">
              ${(profile.personalityTags || []).map((tag) => `<span class="ava-tag">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </section>

          <div class="ava-grid-2 ava-section">
            <div class="ava-card">
              <h3>Best for</h3>
              <ul>${(profile.bestFor || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </div>
            <div class="ava-card">
              <h3>Support style</h3>
              <p style="margin-bottom:12px;font-size:14px;color:var(--cyan-soft);">${escapeHtml(style.headline || "")}</p>
              <ul>${(style.approaches || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </div>
          </div>

          <section class="ava-section">
            <h2>Confidence coaching</h2>
            <p style="margin-bottom:14px;color:var(--cyan-soft);font-size:14px;">${escapeHtml(coaching.headline || "")}</p>
            ${renderList(coaching.examples, "ava-example-list")}
          </section>

          <section class="ava-section">
            <h2>Positive reinforcement</h2>
            <p style="margin-bottom:14px;color:var(--cyan-soft);font-size:14px;">${escapeHtml(reinforcement.headline || "")}</p>
            ${renderList(reinforcement.examples, "ava-example-list")}
          </section>

          <section class="ava-section">
            <h2>Voice in action</h2>
            <div class="ava-examples">
              <div class="ava-example-card">
                <span class="ava-example-label">Lesson greetings</span>
                ${renderList(ex.greetings || (ex.greeting ? [ex.greeting] : []), "ava-example-list")}
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">Hints</span>
                ${renderList(ex.hints || (ex.hint ? [ex.hint] : []), "ava-example-list")}
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">Encouragement</span>
                ${renderList(ex.encouragements || (ex.encouragement ? [ex.encouragement] : []), "ava-example-list")}
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">Assessment guidance</span>
                <p class="ava-example-text" style="margin-bottom:12px;">${escapeHtml(ex.assessmentIntroduction || "")}</p>
                ${renderList(ex.assessmentGuidance, "ava-example-list")}
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">Lesson dialogue</span>
                <div class="ava-dialogue">
                  ${dialogue.map((line) => `
                    <div class="ava-dialogue-line ava-dialogue-line--${escapeHtml(line.role === "ava" ? "ava" : "student")}">
                      <span class="ava-dialogue-role">${escapeHtml(line.role === "ava" ? profile.name : "Student")}</span>
                      ${escapeHtml(line.text)}
                    </div>
                  `).join("")}
                </div>
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">End of lesson</span>
                <p class="ava-example-text">${escapeHtml(ex.endOfLesson || "")}</p>
              </div>
              <div class="ava-example-card">
                <span class="ava-example-label">End of session reflection</span>
                <p class="ava-example-text">${escapeHtml(ex.endOfSessionReflection || "")}</p>
              </div>
            </div>
          </section>

          <div class="ava-footer-cta">
            <a class="ava-cta" href="../assessment/citizenship.html">Start your assessment →</a>
          </div>
        `;
      }

      fetch("../assets/data/tutors/ava.json")
        .then((r) => r.json())
        .then(render)
        .catch(() => {
          root.innerHTML = "<p style=\"color:var(--muted);text-align:center;\">Could not load Ava's profile.</p>";
        });
    })();
  </script>
  <script>
    const cv = document.getElementById("particles"), cx = cv.getContext("2d");
    let dots = [];
    function size(){ cv.width = innerWidth*devicePixelRatio; cv.height = innerHeight*devicePixelRatio; cx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    function init(){ size(); dots = Array.from({length:55},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,z:Math.random()*0.8+0.2,r:Math.random()*1.4+0.4,tw:Math.random()*6.28})); }
    function draw(){ cx.clearRect(0,0,innerWidth,innerHeight); for(const d of dots){ d.y-=d.z*0.25; d.tw+=0.02; if(d.y<-5){d.y=innerHeight+5;d.x=Math.random()*innerWidth;} const a=(0.25+Math.sin(d.tw)*0.2)*d.z; cx.beginPath(); cx.arc(d.x,d.y,d.r*d.z+0.4,0,6.28); cx.fillStyle=`rgba(120,210,255,${a})`; cx.fill(); } requestAnimationFrame(draw); }
    addEventListener("resize", size);
    addEventListener("pointermove",(e)=>{ document.body.style.setProperty("--mx",(e.clientX/innerWidth*100)+"%"); document.body.style.setProperty("--my",(e.clientY/innerHeight*100)+"%"); });
    init(); draw();
  </script>
</body>
</html>
