<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EVOlearn — Milo, Foundation tutor</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../assets/css/tutor-milo.css" />
  <style>
    .milo-profile-page { min-height: 100vh; display: flex; flex-direction: column; }
    .milo-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 26px; position: relative; z-index: 2;
    }
    .milo-topbar .brand-logo { height: 38px; width: auto; display: block; }
    .milo-back {
      color: var(--muted); font-size: 14px; text-decoration: none;
      padding: 8px 14px; border-radius: 999px; border: 1px solid var(--glass-line);
      background: rgba(255,255,255,.04); backdrop-filter: blur(10px);
      transition: color .55s cubic-bezier(.25,.46,.45,.94), border-color .55s cubic-bezier(.25,.46,.45,.94);
    }

    .milo-shell { flex: 1; max-width: 920px; width: 100%; margin: 0 auto; padding: 14px 26px 48px; position: relative; z-index: 1; }

    .milo-hero {
      display: grid; grid-template-columns: 200px 1fr; gap: 28px; align-items: center;
      margin-bottom: 36px;
    }
    .milo-hero-photo {
      position: relative; border-radius: 18px; overflow: hidden; aspect-ratio: 1;
      border: 1px solid var(--glass-line); background: var(--navy-deep);
    }
    .milo-hero-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .milo-hero-badge {
      position: absolute; top: 10px; left: 10px;
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(13,22,30,.75);
      border: 1px solid var(--glass-line); backdrop-filter: blur(6px);
    }
    .milo-hero-copy h1 { font-size: clamp(28px, 4vw, 40px); font-weight: 600; letter-spacing: -.5px; }
    .milo-hero-role { font-size: 14px; letter-spacing: .4px; margin-top: 4px; }
    .milo-catchphrase {
      font-size: 16px; margin-top: 14px; font-style: italic;
    }
    .milo-hero-support { font-size: 15px; color: var(--muted); margin-top: 10px; line-height: 1.55; max-width: 520px; }

    .milo-section { margin-bottom: 32px; }
    .milo-section h2 {
      font-size: 13px; letter-spacing: 1.6px; text-transform: uppercase;
      margin-bottom: 14px; font-weight: 600;
    }
    .milo-section p, .milo-section li { font-size: 15px; line-height: 1.65; color: #cfe1ec; }
    .milo-section ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .milo-section ul li::before { content: "·"; margin-right: 10px; }

    .milo-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .milo-tag {
      font-size: 13px; padding: 6px 12px; border-radius: 999px;
      border: 1px solid var(--glass-line); background: var(--glass);
      backdrop-filter: blur(8px);
    }

    .milo-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .milo-card {
      border-radius: 16px; border: 1px solid var(--glass-line);
      background: var(--glass); backdrop-filter: blur(12px); padding: 18px 20px;
    }
    .milo-card h3 { font-size: 14px; margin-bottom: 10px; font-weight: 600; }

    .milo-examples { display: flex; flex-direction: column; gap: 14px; }
    .milo-example-card {
      border-radius: 14px; border: 1px solid var(--glass-line);
      background: rgba(255,255,255,.04); padding: 16px 18px;
    }
    .milo-example-label {
      font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; display: block;
    }
    .milo-example-text { font-size: 14.5px; line-height: 1.6; color: #d8e8f2; }
    .milo-example-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .milo-example-list li {
      font-size: 14.5px; line-height: 1.6; color: #d8e8f2;
      padding-left: 0;
    }
    .milo-example-list li::before { display: none; }

    .milo-dialogue { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .milo-dialogue-line {
      padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55;
    }
    .milo-dialogue-line--student {
      align-self: flex-end; max-width: 72%;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #eaf4fb;
    }
    .milo-dialogue-role {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px; display: block;
    }

    .milo-footer-cta { margin-top: 12px; text-align: center; }
    .milo-cta {
      display: inline-block; padding: 14px 30px; border-radius: 999px;
      font-size: 15px; font-weight: 600; text-decoration: none; color: #1a2840;
      transition: transform .55s cubic-bezier(.25,.46,.45,.94), box-shadow .55s cubic-bezier(.25,.46,.45,.94);
    }
    .milo-cta:hover { transform: translateY(-2px); }

    @media (max-width: 680px) {
      .milo-hero { grid-template-columns: 1fr; text-align: center; }
      .milo-hero-photo { max-width: 180px; margin: 0 auto; }
      .milo-hero-support { margin-left: auto; margin-right: auto; }
      .milo-grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="agent-milo milo-profile-page">
  <canvas id="particles"></canvas>
  <div class="ambient-glow"></div>

  <div class="milo-profile-page">
    <header class="milo-topbar">
      <a href="../index.html#citizenship" aria-label="Home">
        <img class="brand-logo" src="../assets/logo.svg" alt="EVOlearn" />
      </a>
      <a class="milo-back" href="citizenship.html">← All tutors</a>
    </header>

    <main class="milo-shell" id="milo-profile-root">
      <p style="color:var(--muted);text-align:center;padding:40px 0;">Loading Milo's profile…</p>
    </main>
  </div>

  <script>
    (function () {
      const root = document.getElementById("milo-profile-root");

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderSteps(items, labelKey, textKey) {
        if (!items || !items.length) return "";
        return `<div class="milo-steps">${items.map((item, i) => `
          <div class="milo-step-card">
            <span class="milo-step-num">${item.step != null ? item.step : i + 1}</span>
            <div>
              ${item[labelKey] || item.title ? `<span class="milo-step-label">${escapeHtml(item[labelKey] || item.title)}</span>` : ""}
              <p class="milo-step-text">${escapeHtml(item[textKey] || item.text || "")}</p>
            </div>
          </div>
        `).join("")}</div>`;
      }

      function renderDialogue(lines, tutorName, tutorRole) {
        if (!lines || !lines.length) return "";
        return `<div class="milo-dialogue">${lines.map((line) => {
          const isTutor = line.role === tutorRole || line.role === "milo";
          return `
            <div class="milo-dialogue-line milo-dialogue-line--${isTutor ? "milo" : "student"}">
              <span class="milo-dialogue-role">${escapeHtml(isTutor ? tutorName : "Student")}</span>
              ${escapeHtml(line.text)}
            </div>`;
        }).join("")}</div>`;
      }

      function render(profile) {
        const ex = profile.examples || {};
        const bio = profile.biography || {};
        const style = profile.supportStyle || {};
        const feedback = Array.isArray(ex.feedback) ? ex.feedback : (ex.feedback ? [ex.feedback] : []);
        const prompts = ex.learningPrompts || [];

        root.innerHTML = `
          <section class="milo-hero">
            <div class="milo-hero-photo tutor-milo">
              <span class="milo-hero-badge">Lvl ${profile.level}</span>
              <img src="../${profile.image}" alt="${escapeHtml(profile.name)}, ${escapeHtml(profile.levelName)} tutor" />
            </div>
            <div class="milo-hero-copy">
              <h1>${escapeHtml(profile.name)}</h1>
              <p class="milo-hero-role">Level ${profile.level} · ${escapeHtml(profile.levelName)} · ${escapeHtml(profile.role)}</p>
              <p class="milo-catchphrase">"${escapeHtml(profile.catchphrase)}"</p>
              <p class="milo-hero-support">${escapeHtml(profile.description)}</p>
            </div>
          </section>

          <section class="milo-section">
            <h2>About Milo</h2>
            <p>${escapeHtml(bio.expanded || bio.short || "")}</p>
          </section>

          <section class="milo-section">
            <h2>Personality</h2>
            <div class="milo-tags">
              ${(profile.personalityTags || []).map((tag) => `<span class="milo-tag">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </section>

          <div class="milo-grid-2 milo-section">
            <div class="milo-card">
              <h3>Best for</h3>
              <ul>${(profile.bestFor || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </div>
            <div class="milo-card">
              <h3>Support style</h3>
              <p style="margin-bottom:12px;font-size:14px;color:var(--milo-blue-soft);">${escapeHtml(style.headline || "")}</p>
              <ul>${(style.approaches || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </div>
          </div>

          <section class="milo-section">
            <h2>Voice in action</h2>
            <div class="milo-examples">
              <div class="milo-example-card">
                <span class="milo-example-label">Greeting</span>
                <p class="milo-example-text">${escapeHtml(ex.greeting || "")}</p>
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Feedback examples</span>
                <ul class="milo-example-list">${feedback.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Hint system</span>
                ${renderSteps(ex.hints, "label", "text")}
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Learning prompts</span>
                <ul class="milo-example-list">${prompts.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Assessment introduction</span>
                <p class="milo-example-text">${escapeHtml(ex.assessmentIntroduction || "")}</p>
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Assessment dialogue</span>
                ${renderDialogue(ex.assessmentDialogue, profile.name, "milo")}
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Lesson coaching</span>
                ${renderSteps(ex.lessonCoaching, "title", "text")}
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Lesson dialogue</span>
                ${renderDialogue(ex.lessonDialogue, profile.name, "milo")}
              </div>

              <div class="milo-example-card">
                <span class="milo-example-label">Completion message</span>
                <p class="milo-example-text">${escapeHtml(ex.completionMessage || ex.endOfLesson || "")}</p>
              </div>
            </div>
          </section>

          <div class="milo-footer-cta">
            <a class="milo-cta" href="../assessment/citizenship.html">Start your assessment →</a>
          </div>
        `;
      }

      fetch("../assets/data/tutors/milo.json")
        .then((r) => r.json())
        .then(render)
        .catch(() => {
          root.innerHTML = "<p style=\"color:var(--muted);text-align:center;\">Could not load Milo's profile.</p>";
        });
    })();
  </script>
  <script>
    const cv = document.getElementById("particles"), cx = cv.getContext("2d");
    let dots = [];
    function size(){ cv.width = innerWidth*devicePixelRatio; cv.height = innerHeight*devicePixelRatio; cx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
    function init(){ size(); dots = Array.from({length:55},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,z:Math.random()*0.8+0.2,r:Math.random()*1.4+0.4,tw:Math.random()*6.28})); }
    function draw(){ cx.clearRect(0,0,innerWidth,innerHeight); for(const d of dots){ d.y-=d.z*0.25; d.tw+=0.02; if(d.y<-5){d.y=innerHeight+5;d.x=Math.random()*innerWidth;} const a=(0.25+Math.sin(d.tw)*0.2)*d.z; cx.beginPath(); cx.arc(d.x,d.y,d.r*d.z+0.4,0,6.28); cx.fillStyle=`rgba(124,156,255,${a})`; cx.fill(); } requestAnimationFrame(draw); }
    addEventListener("resize", size);
    addEventListener("pointermove",(e)=>{ document.body.style.setProperty("--mx",(e.clientX/innerWidth*100)+"%"); document.body.style.setProperty("--my",(e.clientY/innerHeight*100)+"%"); });
    init(); draw();
  </script>
</body>
</html>
